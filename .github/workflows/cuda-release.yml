name: cuda-release-validation

on:
  workflow_dispatch:
    inputs:
      cuda_arch:
        description: "80 for A800, 89 for RTX 4090"
        required: true
        type: choice
        options: ["80", "89"]

jobs:
  release-validation:
    runs-on: [self-hosted, linux, x64, cuda]
    steps:
      - uses: actions/checkout@v4
      - name: Configure, build, and test
        env:
          WAM_CUDA_ARCH: ${{ inputs.cuda_arch }}
        run: scripts/release/validate_cuda.sh
